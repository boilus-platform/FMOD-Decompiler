name: Publish Single File

permissions:
  contents: write
  packages: read

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  Building-GUI:
    strategy:
      fail-fast: false

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v5
      with:
        submodules: true
# ----------------------------------------------------------------------------
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
# ----------------------------------------------------------------------------
    - name: Restore Dependencies
      run: dotnet restore
# ----------------------------------------------------------------------------
    - name: Build
      run: |
        dotnet build FMOD-Decompiler.sln --no-restore
# ----------------------------------------------------------------------------
    - name: Publish FMOD-Decompiler
      run: |
        dotnet publish FMOD-Decompiler.sln -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true --output windows-latest
# ----------------------------------------------------------------------------
    - name: Create ZIP from Build
      run: |
        7z a -tzip FMOD-Decompiler-v1.2.0.zip ./windows-latest/* -mx0
# ----------------------------------------------------------------------------
    - name: Upload EFFMOD (release)
      uses: actions/upload-artifact@v4
      with:
       name: FMOD-Decompiler-v1.2.0.zip
       path: FMOD-Decompiler-v1.2.0.zip
